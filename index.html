<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PKG 部門假期與出差總覽</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --surface-0: #f5f5f3; --surface-1: #efefec; --surface-2: #ffffff;
  --text-primary: #1a1a18; --text-secondary: #5a5a56; --text-muted: #8a8a84;
  --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.18);
  --bg-accent: #e6f1fb; --fill-accent: #378ADD; --text-accent: #185FA5;
  --bg-danger: #fcebeb; --text-danger: #A32D2D; --border-danger: #F09595;
  --radius: 8px; --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --surface-0: #1e1e1c; --surface-1: #272724; --surface-2: #323230;
    --text-primary: #e8e8e2; --text-secondary: #a8a8a0; --text-muted: #6a6a64;
    --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.18);
    --bg-accent: #0c2a40; --fill-accent: #378ADD; --text-accent: #85B7EB;
    --bg-danger: #2a1010; --text-danger: #F09595; --border-danger: #A32D2D;
  }
}
body { font-family: var(--font-sans); background: var(--surface-0); color: var(--text-primary); min-height: 100vh; }

/* navbar */
.navbar { position: sticky; top: 0; z-index: 100; background: var(--surface-2); border-bottom: 0.5px solid var(--border); display: flex; align-items: center; padding: 0 1.5rem; height: 48px; gap: 4px; }
.nav-brand { font-size: 14px; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nav-brand span { font-weight: 400; color: var(--text-muted); font-size: 12px; margin-left: 8px; }
.nav-tab { font-size: 13px; padding: 0 14px; height: 100%; display: flex; align-items: center; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; font-family: var(--font-sans); }
.nav-tab:hover { color: var(--text-primary); }
.nav-tab.active { color: var(--fill-accent); border-bottom-color: var(--fill-accent); font-weight: 500; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); display: inline-block; margin-left: 10px; flex-shrink: 0; transition: background 0.3s; }
.sync-dot.ok { background: #1D9E75; }
.sync-dot.err { background: #D85A30; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* views */
.view { display: none; max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
.view.active { display: block; }

/* btn */
.btn { font-size: 12px; padding: 6px 14px; display: inline-flex; align-items: center; gap: 5px; background: var(--surface-2); border: 0.5px solid var(--border-strong); border-radius: var(--radius); cursor: pointer; color: var(--text-primary); transition: background 0.1s; white-space: nowrap; font-family: var(--font-sans); }
.btn:hover { background: var(--surface-1); }
.btn.primary { background: var(--fill-accent); color: #fff; border-color: var(--fill-accent); }
.btn.primary:hover { opacity: 0.9; }
.btn.danger { color: var(--text-danger); border-color: var(--border-danger); background: transparent; }
.btn.danger:hover { background: var(--bg-danger); }

/* calendar */
.toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
.month-nav { flex-shrink: 0; display: flex; align-items: center; gap: 6px; }
.month-nav button { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 20px; line-height: 1; padding: 0; background: var(--surface-2); border: 0.5px solid var(--border-strong); border-radius: var(--radius); cursor: pointer; color: var(--text-primary); font-family: var(--font-sans); }
.month-nav button:hover { background: var(--surface-1); }
.month-label { font-size: 15px; font-weight: 500; min-width: 90px; text-align: center; }
.filter-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 14px; padding: 12px; background: var(--surface-1); border-radius: 10px; border: 0.5px solid var(--border); }
.group-label { font-size: 10px; font-weight: 500; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
.group-label button { font-size: 10px; padding: 1px 7px; border-radius: 4px; background: var(--surface-2); border: 0.5px solid var(--border); color: var(--text-muted); cursor: pointer; font-family: var(--font-sans); }
.group-label button:hover { background: var(--surface-0); }
.member-chips { display: flex; flex-wrap: wrap; gap: 3px; }
.chip { font-size: 11px; padding: 2px 9px; border-radius: 99px; cursor: pointer; border: 0.5px solid var(--border); background: var(--surface-2); color: var(--text-secondary); transition: background 0.1s, color 0.1s; white-space: nowrap; user-select: none; }
.chip.active { color: #fff; }
.chip.g0.active { background: #378ADD; border-color: #378ADD; }
.chip.g1.active { background: #1D9E75; border-color: #1D9E75; }
.chip.g2.active { background: #D85A30; border-color: #D85A30; }
.chip.g3.active { background: #534AB7; border-color: #534AB7; }
.calendar-wrap { overflow-x: auto; border-radius: 10px; border: 0.5px solid var(--border); }
.calendar { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 620px; background: var(--surface-2); }
.calendar thead th { text-align: center; padding: 4px 1px; font-weight: 500; font-size: 10px; color: var(--text-muted); border-bottom: 0.5px solid var(--border); background: var(--surface-1); position: sticky; top: 0; z-index: 2; }
.calendar thead th.name-col { text-align: left; padding-left: 10px; min-width: 120px; width: 130px; font-size: 11px; position: sticky; top: 0; left: 0; z-index: 3; background: var(--surface-1); }
.calendar thead th.day-col { min-width: 22px; max-width: 28px; }
.calendar tbody td { padding: 2px 1px; text-align: center; border-bottom: 0.5px solid var(--border); }
.calendar tbody td.name-cell { text-align: left; padding: 5px 10px; white-space: nowrap; border-right: 0.5px solid var(--border); position: sticky; left: 0; background: var(--surface-2); z-index: 1; }
.name-en { font-weight: 500; font-size: 12px; }
.name-zh { font-size: 10px; color: var(--text-muted); }
.group-header td { font-size: 10px; font-weight: 500; padding: 6px 10px 4px; background: var(--surface-1); border-top: 0.5px solid var(--border); position: sticky; left: 0; }
.day-cell { height: 28px; width: 100%; border-radius: 3px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; }
.day-cell.leave { border-radius: 0; }
.day-cell.leave-start { border-radius: 4px 0 0 4px; }
.day-cell.leave-end { border-radius: 0 4px 4px 0; }
.day-cell.leave-single { border-radius: 4px; }
.day-cell.weekend { opacity: 0.4; }
.col-today { background: var(--bg-accent); }
.count-cell { font-size: 11px; font-weight: 500; min-width: 38px; text-align: center; padding: 0 4px; }
.legend { display: flex; gap: 14px; align-items: center; margin-top: 12px; font-size: 11px; color: var(--text-secondary); flex-wrap: wrap; }
.swatch { width: 28px; height: 10px; border-radius: 2px; display: inline-block; }

/* manage view */
.manage-block { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 10px; padding: 1.25rem; margin-bottom: 1.25rem; }
.manage-block-title { font-size: 13px; font-weight: 500; color: var(--text-primary); margin-bottom: 1rem; padding-bottom: 8px; border-bottom: 0.5px solid var(--border); }
.filter-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 14px; }
.filter-field { display: flex; flex-direction: column; gap: 4px; min-width: 120px; flex: 1; }
.filter-field label { font-size: 11px; color: var(--text-secondary); }
.filter-field select, .filter-field input { padding: 6px 10px; font-size: 12px; border: 0.5px solid var(--border-strong); border-radius: var(--radius); background: var(--surface-1); color: var(--text-primary); font-family: var(--font-sans); outline: none; }
.filter-field select:focus, .filter-field input:focus { border-color: var(--fill-accent); }
.rtable-wrap { overflow-x: auto; border: 0.5px solid var(--border); border-radius: var(--radius); }
.rtable { width: 100%; border-collapse: collapse; font-size: 12px; background: var(--surface-2); }
.rtable th { padding: 9px 12px; font-size: 11px; font-weight: 500; color: var(--text-muted); background: var(--surface-1); border-bottom: 0.5px solid var(--border); text-align: left; white-space: nowrap; }
.rtable td { padding: 9px 12px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
.rtable tr:last-child td { border-bottom: none; }
.rtable tbody tr:hover td { background: var(--surface-1); }
.type-badge { font-size: 11px; padding: 2px 9px; border-radius: 99px; white-space: nowrap; display: inline-block; font-weight: 500; }
.dur-chip { font-size: 11px; color: var(--text-muted); background: var(--surface-1); padding: 2px 8px; border-radius: 99px; }
.empty-msg { text-align: center; padding: 2.5rem; color: var(--text-muted); font-size: 12px; }
.rec-count { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }

/* confirm overlay */
.confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 300; }
.confirm-box { background: var(--surface-2); border: 0.5px solid var(--border-strong); border-radius: 14px; padding: 1.5rem; width: 340px; max-width: 92vw; box-shadow: 0 12px 40px rgba(0,0,0,0.2); }
.confirm-box h4 { font-size: 15px; font-weight: 500; margin-bottom: 8px; }
.confirm-box p { font-size: 12px; color: var(--text-secondary); line-height: 1.65; margin-bottom: 1.2rem; }
.confirm-box .warn { background: var(--bg-danger); color: var(--text-danger); font-size: 11px; padding: 6px 10px; border-radius: 6px; margin-bottom: 1rem; }
.confirm-box .actions { display: flex; gap: 8px; justify-content: flex-end; }

/* modal */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 200; }
.modal { background: var(--surface-2); border: 0.5px solid var(--border-strong); border-radius: 14px; padding: 1.5rem; width: 340px; max-width: 92vw; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
.modal h3 { font-size: 15px; font-weight: 500; margin-bottom: 1.1rem; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
.field input, .field select { width: 100%; padding: 7px 10px; font-size: 13px; border: 0.5px solid var(--border-strong); border-radius: var(--radius); background: var(--surface-1); color: var(--text-primary); font-family: var(--font-sans); outline: none; }
.field input:focus, .field select:focus { border-color: var(--fill-accent); box-shadow: 0 0 0 3px var(--bg-accent); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; }
.type-toggle { display: flex; border: 0.5px solid var(--border-strong); border-radius: var(--radius); overflow: hidden; }
.type-btn { flex: 1; padding: 7px; font-size: 12px; text-align: center; cursor: pointer; background: var(--surface-1); color: var(--text-secondary); border: none; font-family: var(--font-sans); transition: background 0.1s; }
.type-btn:first-child { border-right: 0.5px solid var(--border-strong); }
.type-btn.selected { background: var(--fill-accent); color: #fff; }
.add-member-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; padding: 12px; background: var(--surface-0); border-radius: var(--radius); margin-bottom: 12px; }
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">PKG 假期出差 <span>包裝設計部 · Merry Electronics</span></div>
  <button class="nav-tab active" id="tab-cal" onclick="switchView('cal')">行事曆</button>
  <button class="nav-tab" id="tab-rec" onclick="switchView('rec')">紀錄管理</button>
  <button class="nav-tab" id="tab-mem" onclick="switchView('mem')">成員編制</button>
  <button class="btn primary" onclick="openAddLeave()" style="margin-left:10px;padding:5px 12px;font-size:12px">＋ 登記</button>
  <span class="sync-dot" id="syncDot" title="同步狀態"></span>
</nav>

<!-- 行事曆 -->
<div class="view active" id="view-cal">
  <div class="toolbar">
    <div class="month-nav">
      <button onclick="prevMonth()" style="font-size:18px;font-weight:bold"><button onclick="prevMonth()">&#8249;</button>lt;</button>
      <div class="month-label" id="monthLabel"></div>
      <button onclick="nextMonth()" style="font-size:18px;font-weight:bold"><button onclick="nextMonth()">&#8250;</button>gt;</button>
    </div>
  </div>
  <div class="filter-panel" id="filterPanel"></div>
  <div class="calendar-wrap"><table class="calendar" id="cal"></table></div>
  <div class="legend" id="legend"></div>
</div>

<!-- 紀錄管理 -->
<div class="view" id="view-rec">
  <div class="manage-block">
    <div class="manage-block-title">篩選條件</div>
    <div class="filter-row">
      <div class="filter-field">
        <label>組別</label>
        <select id="rf-group" onchange="onGroupChange()">
          <option value="">全部組別</option>
          <option value="g0">包裝設計部</option>
          <option value="g1">包裝設計一課</option>
          <option value="g2">包裝設計二課</option>
          <option value="g3">包裝設計三課</option>
        </select>
      </div>
      <div class="filter-field">
        <label>成員</label>
        <select id="rf-member" onchange="renderRecords()"><option value="">全部成員</option></select>
      </div>
      <div class="filter-field">
        <label>類型</label>
        <select id="rf-type" onchange="renderRecords()">
          <option value="">全部類型</option>
          <option value="leave">休假</option>
          <option value="trip">出差</option>
        </select>
      </div>
      <div class="filter-field">
        <label>日期（自）</label>
        <input type="date" id="rf-from" onchange="renderRecords()">
      </div>
      <div class="filter-field">
        <label>日期（至）</label>
        <input type="date" id="rf-to" onchange="renderRecords()">
      </div>
      <button class="btn" onclick="clearFilters()" style="align-self:flex-end">清除</button>
    </div>
    <div class="rec-count" id="recCount"></div>
    <div class="rtable-wrap">
      <table class="rtable">
        <thead><tr><th>類型</th><th>成員</th><th>組別</th><th>日期</th><th>天數</th><th></th></tr></thead>
        <tbody id="recBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- 成員編制 -->
<div class="view" id="view-mem">
  <div class="manage-block">
    <div class="manage-block-title">新增成員</div>
    <div class="add-member-row">
      <div class="filter-field" style="min-width:130px;max-width:160px">
        <label>課別</label>
        <select id="nm-group">
          <option value="g0">包裝設計部</option>
          <option value="g1">包裝設計一課</option>
          <option value="g2">包裝設計二課</option>
          <option value="g3">包裝設計三課</option>
        </select>
      </div>
      <div class="filter-field">
        <label>英文姓名</label>
        <input type="text" id="nm-en" placeholder="Firstname Lastname">
      </div>
      <div class="filter-field">
        <label>中文姓名</label>
        <input type="text" id="nm-zh" placeholder="中文全名">
      </div>
      <button class="btn primary" onclick="addMember()" style="align-self:flex-end">新增</button>
    </div>
  </div>
  <div class="manage-block">
    <div class="manage-block-title">成員名冊</div>
    <div class="rtable-wrap">
      <table class="rtable">
        <thead><tr><th>組別</th><th>英文姓名</th><th>中文姓名</th><th></th></tr></thead>
        <tbody id="memBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="modal" style="display:none"></div>
<div id="confirmOverlay" style="display:none"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, push, remove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const app = initializeApp({
  apiKey: "AIzaSyPlaceholderKeyForLocalUse",
  databaseURL: "https://pkg-leave-tracker-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db = getDatabase(app);
const entriesRef = ref(db, 'entries');
const membersRef = ref(db, 'members');

const GROUP_META = {
  g0: { label: '包裝設計部',   dark: '#378ADD', light: '#B5D4F4', textLight: '#0C447C' },
  g1: { label: '包裝設計一課', dark: '#1D9E75', light: '#9FE1CB', textLight: '#085041' },
  g2: { label: '包裝設計二課', dark: '#D85A30', light: '#F0997B', textLight: '#712B13' },
  g3: { label: '包裝設計三課', dark: '#534AB7', light: '#AFA9EC', textLight: '#26215C' }
};

const DEFAULT_MEMBERS = [
  { en: 'Debby Kuo',    zh: '郭惠欣',   group: 'g0' },
  { en: 'Una Li',       zh: '李宜宣',   group: 'g0' },
  { en: 'Winkee Ong',   zh: '翁綵琁',   group: 'g0' },
  { en: 'Queenie Hsu',  zh: '許惠雅',   group: 'g1' },
  { en: 'Michelle Liu', zh: '劉雅婷',   group: 'g1' },
  { en: 'Elsa Lai',     zh: '賴室臣',   group: 'g1' },
  { en: 'Celia Hung',   zh: '洪琇琪',   group: 'g1' },
  { en: 'Tim Chen',     zh: '陳宗穎',   group: 'g2' },
  { en: 'Jojo Chen',    zh: '陳慧汶',   group: 'g2' },
  { en: 'Jason Li',     zh: '李昶毅',   group: 'g2' },
  { en: 'Eddy Guo',     zh: '郭宗林',   group: 'g2' },
  { en: 'Kate Cho',     zh: '卓育如',   group: 'g2' },
  { en: 'Hazel Liu',    zh: '劉宜涵',   group: 'g2' },
  { en: 'Sanra Su',     zh: '蘇芷靜',   group: 'g3' },
  { en: 'Avery Hu',     zh: '胡輔真',   group: 'g3' },
  { en: 'Huxley Liu',   zh: '劉浩',     group: 'g3' },
  { en: 'John Yen',     zh: '顏學淵',   group: 'g3' },
  { en: 'Sunny Chang',  zh: '張劉舒涵', group: 'g3' },
  { en: 'Ainley Lin',   zh: '林筱涵',   group: 'g3' },
  { en: 'Stacy Fang',   zh: '方雅麗',   group: 'g3' },
];

let entries = {};
let dbMembers = {};
let GROUPS = [];
let GROUP_MAP = {};
let hiddenMembers = new Set();
let viewYear, viewMonth;
const today = new Date();

// ── Firebase listeners ──
onValue(membersRef, snap => {
  const data = snap.val();
  if (!data) { DEFAULT_MEMBERS.forEach(m => push(membersRef, m)); return; }
  dbMembers = data;
  rebuildGroups();
  renderAll();
  renderMembers();
  rebuildMemberFilter();
  renderRecords();
}, () => {});

onValue(entriesRef, snap => {
  entries = snap.val() || {};
  document.getElementById('syncDot').className = 'sync-dot ok';
  renderCalendar();
  renderRecords();
}, () => { document.getElementById('syncDot').className = 'sync-dot err'; });

function rebuildGroups() {
  GROUP_MAP = {};
  const temp = { g0:[], g1:[], g2:[], g3:[] };
  Object.entries(dbMembers).forEach(([fbKey, m]) => {
    if (!temp[m.group]) return;
    const obj = { en: m.en, zh: m.zh, fbKey };
    temp[m.group].push(obj);
    GROUP_MAP[m.en] = { ...GROUP_META[m.group], key: m.group, ...obj };
  });
  GROUPS = Object.keys(GROUP_META).map(gKey => ({
    ...GROUP_META[gKey], key: gKey,
    members: temp[gKey].sort((a,b) => a.en.localeCompare(b.en))
  }));
}

// ── helpers ──
function pad(n) { return String(n).padStart(2,'0'); }
function toKey(y,m,d) { return `${y}-${pad(m)}-${pad(d)}`; }
function daysInMonth(y,m) { return new Date(y,m,0).getDate(); }
function isWeekend(y,m,d) { const w=new Date(y,m-1,d).getDay(); return w===0||w===6; }
function daysBetween(from,to) { return Math.round((new Date(to+'T00:00:00')-new Date(from+'T00:00:00'))/(864e5))+1; }

function getEntryMap(en) {
  const map = {};
  Object.entries(entries).forEach(([fbKey,lv]) => {
    if (lv.member!==en) return;
    let cur=new Date(lv.from+'T00:00:00');
    const end=new Date(lv.to+'T00:00:00');
    while(cur<=end){
      map[toKey(cur.getFullYear(),cur.getMonth()+1,cur.getDate())]={type:lv.type,fbKey};
      cur.setDate(cur.getDate()+1);
    }
  });
  return map;
}

// ── view switch ──
window.switchView = function(v) {
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.getElementById('tab-'+v).classList.add('active');
  if(v==='rec') renderRecords();
  if(v==='mem') renderMembers();
};

// ── filter panel ──
function renderFilterPanel() {
  document.getElementById('filterPanel').innerHTML = GROUPS.map(g => {
    const chips = g.members.map(m => {
      const active = !hiddenMembers.has(m.en);
      return `<span class="chip ${g.key} ${active?'active':''}" onclick="toggleMember('${m.en}')" title="${m.en} ${m.zh}">${m.en.split(' ')[0]}</span>`;
    }).join('');
    return `<div>
      <div class="group-label">
        <span style="color:${g.dark};font-weight:500">${g.label}</span>
        <button onclick="toggleGroup('${g.key}')">切換</button>
      </div>
      <div class="member-chips">${chips}</div>
    </div>`;
  }).join('');
}
window.toggleMember=function(en){if(hiddenMembers.has(en))hiddenMembers.delete(en);else hiddenMembers.add(en);renderAll();};
window.toggleGroup=function(gKey){
  const g=GROUPS.find(x=>x.key===gKey);
  const allH=g.members.every(m=>hiddenMembers.has(m.en));
  g.members.forEach(m=>{if(allH)hiddenMembers.delete(m.en);else hiddenMembers.add(m.en);});
  renderAll();
};

// ── calendar ──
function renderCalendar() {
  const y=viewYear, mo=viewMonth;
  if(!y||!GROUPS.length) return;
  const total=daysInMonth(y,mo);
  const todayCol=(today.getFullYear()===y&&today.getMonth()+1===mo)?today.getDate():-1;
  let head='<thead><tr><th class="name-col">成員</th>';
  for(let d=1;d<=total;d++){
    const isWk=isWeekend(y,mo,d),isT=d===todayCol;
    head+=`<th class="day-col${isT?' col-today':''}"><span style="font-size:10px;${isWk?'opacity:0.4':''}${isT?';color:var(--text-accent);font-weight:600':''}">${d}</span></th>`;
  }
  head+='<th style="min-width:38px;font-size:10px;color:var(--text-muted);text-align:center">假/差</th></tr></thead>';
  let body='<tbody>';
  let tL=0,tT=0;
  for(const g of GROUPS){
    const vis=g.members.filter(m=>!hiddenMembers.has(m.en));
    if(!vis.length) continue;
    body+=`<tr class="group-header"><td colspan="${total+2}" style="border-left:3px solid ${g.dark};color:${g.dark}">${g.label}</td></tr>`;
    for(const member of vis){
      const eMap=getEntryMap(member.en);
      let cL=0,cT=0;
      for(let d=1;d<=total;d++){const e=eMap[toKey(y,mo,d)];if(e?.type==='leave')cL++;if(e?.type==='trip')cT++;}
      tL+=cL;tT+=cT;
      body+=`<tr><td class="name-cell"><div class="name-en">${member.en}</div><div class="name-zh">${member.zh}</div></td>`;
      for(let d=1;d<=total;d++){
        const key=toKey(y,mo,d),entry=eMap[key],type=entry?.type;
        const pE=d>1?eMap[toKey(y,mo,d-1)]:null,nE=d<total?eMap[toKey(y,mo,d+1)]:null;
        const isWk=isWeekend(y,mo,d),isT=d===todayCol;
        let cls='day-cell';let bg='',color='';
        if(type){
          cls+=' leave';
          const ps=pE?.type===type,ns=nE?.type===type;
          if(!ps&&!ns)cls+=' leave-single';else if(!ps)cls+=' leave-start';else if(!ns)cls+=' leave-end';
          bg=type==='leave'?g.dark:g.light;color=type==='leave'?'#fff':g.textLight;
        }
        if(isWk)cls+=' weekend';
        body+=`<td class="${isT&&!type?'col-today':''}"><div class="${cls}" style="${bg?`background:${bg};color:${color}`:''}">${type==='trip'?'✈':''}</div></td>`;
      }
      const cs=[cL?`<span style="color:${g.dark}">${cL}</span>`:'',cT?`<span style="color:${g.dark};opacity:0.55">${cT}</span>`:''].filter(Boolean).join('/');
      body+=`<td class="count-cell">${cs}</td></tr>`;
    }
  }
  body+='</tbody>';
  document.getElementById('cal').innerHTML=head+body;
  document.getElementById('legend').innerHTML=
    `<div style="display:flex;align-items:center;gap:5px"><span class="swatch" style="background:#378ADD"></span> 休假</div>`+
    `<div style="display:flex;align-items:center;gap:5px"><span class="swatch" style="background:#B5D4F4"></span> ✈ 出差</div>`+
    `<div style="flex:1"></div>`+
    ((tL||tT)?`<span style="color:var(--text-muted)">本月 休假 ${tL} 天 · 出差 ${tT} 天</span>`:'');
}
function renderAll(){
  document.getElementById('monthLabel').textContent=`${viewYear} / ${pad(viewMonth)}`;
  renderFilterPanel();renderCalendar();
}
window.prevMonth=function(){viewMonth--;if(viewMonth<1){viewMonth=12;viewYear--;}renderAll();};
window.nextMonth=function(){viewMonth++;if(viewMonth>12){viewMonth=1;viewYear++;}renderAll();};

// ── records ──
function rebuildMemberFilter() {
  const gKey=document.getElementById('rf-group')?.value||'';
  const sel=document.getElementById('rf-member');
  if(!sel) return;
  const prev=sel.value;
  sel.innerHTML='<option value="">全部成員</option>';
  const gs=gKey?GROUPS.filter(g=>g.key===gKey):GROUPS;
  gs.forEach(g=>{
    const og=document.createElement('optgroup');og.label=g.label;
    g.members.forEach(m=>{const o=document.createElement('option');o.value=m.en;o.textContent=`${m.en}（${m.zh}）`;og.appendChild(o);});
    sel.appendChild(og);
  });
  if([...sel.options].some(o=>o.value===prev))sel.value=prev;
}
window.onGroupChange=function(){rebuildMemberFilter();renderRecords();};

window.renderRecords=function(){
  const gKey=document.getElementById('rf-group').value;
  const member=document.getElementById('rf-member').value;
  const type=document.getElementById('rf-type').value;
  const from=document.getElementById('rf-from').value;
  const to=document.getElementById('rf-to').value;
  let list=Object.entries(entries).map(([fbKey,e])=>({...e,fbKey}));
  if(gKey){const g=GROUPS.find(x=>x.key===gKey);if(g)list=list.filter(e=>g.members.some(m=>m.en===e.member));}
  if(member)list=list.filter(e=>e.member===member);
  if(type)list=list.filter(e=>e.type===type);
  if(from)list=list.filter(e=>e.to>=from);
  if(to)list=list.filter(e=>e.from<=to);
  list.sort((a,b)=>b.from.localeCompare(a.from)||a.member.localeCompare(b.member));
  document.getElementById('recCount').textContent=list.length?`共 ${list.length} 筆紀錄`:'';
  const tbody=document.getElementById('recBody');
  if(!tbody)return;
  if(!list.length){tbody.innerHTML=`<tr><td colspan="6"><div class="empty-msg">沒有符合條件的紀錄</div></td></tr>`;return;}
  tbody.innerHTML=list.map(e=>{
    const g=GROUP_MAP[e.member];
    const bg=e.type==='leave'?(g?.dark||'#378ADD'):(g?.light||'#B5D4F4');
    const color=e.type==='leave'?'#fff':(g?.textLight||'#333');
    const label=e.type==='leave'?'休假':'出差';
    const dateStr=e.from===e.to?e.from:`${e.from} ～ ${e.to}`;
    const days=daysBetween(e.from,e.to);
    const mInfo=Object.values(dbMembers).find(m=>m.en===e.member);
    return `<tr>
      <td><span class="type-badge" style="background:${bg};color:${color}">${label}</span></td>
      <td><div style="font-weight:500">${e.member}</div><div style="font-size:10px;color:var(--text-muted)">${mInfo?.zh||''}</div></td>
      <td style="font-size:11px;color:${g?.dark||'inherit'}">${g?.label||''}</td>
      <td style="font-size:11px">${dateStr}</td>
      <td><span class="dur-chip">${days} 天</span></td>
      <td><button class="btn danger" onclick="confirmDeleteEntry('${e.fbKey}','${e.member}','${dateStr}','${label}')">刪除</button></td>
    </tr>`;
  }).join('');
};

window.clearFilters=function(){
  document.getElementById('rf-group').value='';
  document.getElementById('rf-type').value='';
  document.getElementById('rf-from').value='';
  document.getElementById('rf-to').value='';
  rebuildMemberFilter();
  renderRecords();
};

// ── members ──
window.addMember=function(){
  const group=document.getElementById('nm-group').value;
  const en=document.getElementById('nm-en').value.trim();
  const zh=document.getElementById('nm-zh').value.trim();
  if(!en||!zh){alert('請填寫完整英文與中文姓名');return;}
  if(Object.values(dbMembers).some(m=>m.en.toLowerCase()===en.toLowerCase())){alert('此英文姓名已存在');return;}
  push(membersRef,{group,en,zh});
  document.getElementById('nm-en').value='';
  document.getElementById('nm-zh').value='';
};

function renderMembers(){
  const tbody=document.getElementById('memBody');
  if(!tbody)return;
  const list=Object.entries(dbMembers).map(([fbKey,m])=>({...m,fbKey})).sort((a,b)=>a.group.localeCompare(b.group)||a.en.localeCompare(b.en));
  if(!list.length){tbody.innerHTML=`<tr><td colspan="4"><div class="empty-msg">尚無成員</div></td></tr>`;return;}
  tbody.innerHTML=list.map(m=>{
    const meta=GROUP_META[m.group]||{};
    return `<tr>
      <td style="color:${meta.dark||'inherit'};font-size:11px">${meta.label||m.group}</td>
      <td style="font-weight:500">${m.en}</td>
      <td style="color:var(--text-secondary)">${m.zh}</td>
      <td><button class="btn danger" onclick="confirmDeleteMember('${m.fbKey}','${m.en}','${m.zh}')">移除</button></td>
    </tr>`;
  }).join('');
}

// ── confirm delete (entries) ──
window.confirmDeleteEntry=function(fbKey,member,dateStr,label){
  showConfirm(
    '確認刪除紀錄？',
    `即將刪除 <strong>${member}</strong> 的 <strong>${label}</strong> 紀錄：<br>${dateStr}`,
    ()=>{ remove(ref(db,'entries/'+fbKey)); }
  );
};

// ── confirm delete (member) ──
window.confirmDeleteMember=function(fbKey,en,zh){
  showConfirm(
    '確認移除成員？',
    `即將從編制中移除 <strong>${en}（${zh}）</strong>。<br>該成員的歷史假期／出差紀錄<strong>不會</strong>一併刪除。`,
    ()=>{ remove(ref(db,'members/'+fbKey)); }
  );
};

function showConfirm(title, msg, onConfirm) {
  const ov=document.getElementById('confirmOverlay');
  ov.className='confirm-overlay';ov.style.display='flex';
  ov.innerHTML=`<div class="confirm-box">
    <h4>${title}</h4>
    <p>${msg}</p>
    <div class="warn">⚠ 此操作無法復原，請確認後再執行</div>
    <div class="actions">
      <button class="btn" onclick="closeConfirm()">取消</button>
      <button class="btn danger" id="confirmBtn">確認刪除</button>
    </div>
  </div>`;
  document.getElementById('confirmBtn').onclick=()=>{onConfirm();closeConfirm();};
}
window.closeConfirm=function(){document.getElementById('confirmOverlay').style.display='none';};

// ── add entry modal ──
let modalType='leave';
function memberOpts(){
  return GROUPS.map(g=>`<optgroup label="${g.label}">${g.members.map(m=>`<option value="${m.en}">${m.en}（${m.zh}）</option>`).join('')}</optgroup>`).join('');
}
window.openAddLeave=function(){
  modalType='leave';
  const first=`${viewYear}-${pad(viewMonth)}-01`;
  const m=document.getElementById('modal');
  m.className='modal-bg';m.style.display='flex';
  m.innerHTML=`<div class="modal">
    <h3>登記假期／出差</h3>
    <div class="field"><label>類型</label>
      <div class="type-toggle">
        <div class="type-btn selected" id="mt-leave" onclick="setMT('leave')">休假</div>
        <div class="type-btn" id="mt-trip" onclick="setMT('trip')">出差 ✈</div>
      </div>
    </div>
    <div class="field"><label>成員</label><select id="lvM">${memberOpts()}</select></div>
    <div class="field-row">
      <div class="field"><label>開始日</label><input id="lvF" type="date" value="${first}"></div>
      <div class="field"><label>結束日</label><input id="lvT" type="date" value="${first}"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="addEntry()">確認登記</button>
    </div>
  </div>`;
};
window.setMT=function(t){
  modalType=t;
  document.getElementById('mt-leave').className='type-btn'+(t==='leave'?' selected':'');
  document.getElementById('mt-trip').className='type-btn'+(t==='trip'?' selected':'');
};
window.addEntry=function(){
  const member=document.getElementById('lvM').value;
  const from=document.getElementById('lvF').value;
  const to=document.getElementById('lvT').value;
  if(!from||!to||from>to){alert('日期範圍有誤');return;}
  push(entriesRef,{member,from,to,type:modalType});
  closeModal();
};
window.closeModal=function(){document.getElementById('modal').style.display='none';};
document.addEventListener('keydown',e=>{if(e.key==='Escape'){window.closeModal();window.closeConfirm();}});

// init
viewYear=today.getFullYear();viewMonth=today.getMonth()+1;
renderAll();
</script>
</body>
</html>
